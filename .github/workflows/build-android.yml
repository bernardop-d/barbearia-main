name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: ./mobile
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK
        working-directory: ./mobile
        run: eas build --platform android --profile preview --non-interactive

      - name: Get APK URL
        working-directory: ./mobile
        run: |
          APK_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV

      - name: Download APK
        run: curl -L "$APK_URL" -o dungabarber.apk

      - name: Get version
        run: |
          VERSION=$(node -p "require('./mobile/app.json').expo.version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: DUNGABARBER v${{ env.VERSION }}
          body: |
            ## Download
            Baixe o arquivo `dungabarber.apk` abaixo e instale no Android.
            > Habilite "Instalar de fontes desconhecidas" caso solicitado.
          files: dungabarber.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
